name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Release Action
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-lint: 'true'
          enable-test: 'true'
          enable-build: 'true'
          enable-docker: 'true'
          enable-release: 'true'